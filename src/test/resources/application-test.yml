spring:
  datasource:
    url: jdbc:h2:mem:testdb  # 인메모리 H2 데이터베이스
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop  # 테스트 시작 시 스키마 생성, 종료 시 삭제
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.H2Dialect  # H2 방언 사용

  h2:
    console:
      enabled: false

  data:
    redis:
      host: localhost
      port: 6379  # Redis 기본 포트
      password:

  ai:
    openai:
      api-key: test-api-key
      google-project-id: "test-project-id"
      google-location: "us-central1"
      chat:
        base-url: https://generativelanguage.googleapis.com
        completion-path: /v1beta/models
        model: gemini-2.0-flash
      embedding:
        model: models/gemini-embedding-001

jwt:
  secret: test-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-HS256-algorithm
  access-token-expiration: 900000
  refresh-token-expiration: 86400000
  cookie:
    secure: false
    domain: localhost
    same-site: Lax

fastapi:
  RECOMMENDATION_FASTAPI_URL: http://localhost:8000  # 테스트용 더미 URL
  REVIEW_ANALYSIS_FASTAPI_URL: http://localhost:8000  # 테스트용 더미 URL

logging:
  level:
    com.babgo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN