spring:
  application:
    name: babgo

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}

logging:
  level:
    com.babgo: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

payment:
  success-base-url: ${PAYMENT_BASEURL}
  fail-base-url: ${PAYMENT_FAIL_BASEURL}
  webhook-url: ${PAYMENT_WEBHOOK_URL}

pg-sim:
  auto: approve  # 기본 자동승인
